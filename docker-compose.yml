services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: med_assistant
      POSTGRES_USER: med_user
      POSTGRES_PASSWORD: med_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U med_user -d med_assistant"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: .
    command: ["python", "-m", "scripts.migrate"]
    environment:
      DATABASE_URL: postgresql://med_user:med_pass@postgres:5432/med_assistant
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://med_user:med_pass@postgres:5432/med_assistant
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_BACKEND: hash
      EMBEDDING_DIMENSION: 1024
      RERANKER_BACKEND: lexical
      ANSWER_BACKEND: extractive
      API_HOST: 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
