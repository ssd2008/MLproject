services:
  postgres:
    image: postgres:16
    container_name: med_postgres
    environment:
      POSTGRES_DB: med_assistant
      POSTGRES_USER: med_user
      POSTGRES_PASSWORD: med_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: med_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: