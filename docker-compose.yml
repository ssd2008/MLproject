x-backend-image: &backend-image
  image: mlproject-api:local

x-ml-environment: &ml-environment
  EMBEDDING_BACKEND: sentence-transformers
  EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-intfloat/multilingual-e5-large}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
  EMBEDDING_BATCH_SIZE: 8
  EMBEDDING_DEVICE: cpu
  NORMALIZE_EMBEDDINGS: "true"
  RERANKER_ENABLED: "false"
  RERANKER_BACKEND: cross-encoder
  RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-BAAI/bge-reranker-v2-m3}
  RERANKER_BATCH_SIZE: 4
  RERANKER_DEVICE: cpu
  ASR_BACKEND: faster-whisper
  ASR_MODEL_NAME: small
  ASR_DEVICE: cpu
  ASR_COMPUTE_TYPE: int8
  ASR_BEAM_SIZE: 5
  ASR_VAD_FILTER: "true"
  VIDEO_CHUNK_DURATION_SECONDS: 20
  VIDEO_CHUNK_OVERLAP_SECONDS: 2
  VIDEO_CONTEXT_NEIGHBOR_CHUNKS: 1
  ANSWER_BACKEND: extractive
  HF_HOME: /models/huggingface
  HF_HUB_DISABLE_XET: "1"
  HF_HUB_DOWNLOAD_TIMEOUT: "300"
  HF_HUB_ETAG_TIMEOUT: "60"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: med_assistant
      POSTGRES_USER: med_user
      POSTGRES_PASSWORD: "med\u005fpass"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U med_user -d med_assistant"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    <<: *backend-image
    command: ["python", "-m", "scripts.migrate"]
    environment:
      DATABASE_URL: postgresql://med_user:med%5Fpass@postgres:5432/med_assistant
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  model-init:
    <<: *backend-image
    command: ["python", "-m", "scripts.download_models"]
    environment:
      <<: *ml-environment
    volumes:
      - huggingface_cache:/models/huggingface
      - ./.models:/models/local:ro
    restart: "no"

  api:
    <<: *backend-image
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements-ml.lock.txt
    environment:
      <<: *ml-environment
      DATABASE_URL: postgresql://med_user:med%5Fpass@postgres:5432/med_assistant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: document_chunks_e5_large_v1
      MAX_DOCUMENT_SIZE_MB: 10
      MAX_VIDEO_SIZE_MB: 2048
      API_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/data/uploads
      - huggingface_cache:/models/huggingface
      - ./.models:/models/local:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      model-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
  huggingface_cache:
