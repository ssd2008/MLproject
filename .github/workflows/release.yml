name: release

on:
  push:
    branches: [master]
    paths:
      - "CHANGELOG.md"
      - "pyproject.toml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create version release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          tag = f"v{version}"
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)",
              changelog,
              flags=re.MULTILINE | re.DOTALL,
          )
          if match is None:
              raise RuntimeError(f"CHANGELOG.md does not contain a section for {version}")

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          api_root = f"https://api.github.com/repos/{repository}"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2026-03-10",
          }

          check = urllib.request.Request(
              f"{api_root}/releases/tags/{tag}",
              headers=headers,
          )
          try:
              with urllib.request.urlopen(check, timeout=30):
                  print(f"Release {tag} already exists; nothing to do.")
                  raise SystemExit(0)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          payload = json.dumps(
              {
                  "tag_name": tag,
                  "target_commitish": os.environ["GITHUB_SHA"],
                  "name": f"{tag} — Technical MVP",
                  "body": match.group(0).strip(),
                  "draft": False,
                  "prerelease": False,
                  "make_latest": "true",
              }
          ).encode("utf-8")
          create = urllib.request.Request(
              f"{api_root}/releases",
              data=payload,
              headers=headers,
              method="POST",
          )
          with urllib.request.urlopen(create, timeout=30) as response:
              result = json.load(response)
          print(f"Created release: {result['html_url']}")
          PY
