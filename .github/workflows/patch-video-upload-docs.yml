name: patch-video-upload-docs

on:
  push:
    branches: [master]
    paths:
      - tests/.trigger-video-upload-docs

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Synchronize video upload documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path("md").glob("*.md"):
              text = path.read_text(encoding="utf-8")
              text = text.replace("500 МБ", "2 ГБ")
              text = text.replace("500 MB", "2 GB")
              path.write_text(text, encoding="utf-8")
          PY
          python -m compileall -q app tests
          rm -f tests/.trigger-video-upload-docs
          rm -f .github/workflows/patch-video-upload-docs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Document 2 GiB video uploads"
          git push
