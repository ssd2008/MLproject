name: ci

on:
  push:
    branches: [master, "agent/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: ruff check . --output-format=concise | tee ruff-report.txt
      - name: Upload Ruff report
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.txt
      - name: Enforce Ruff result
        if: steps.ruff.outcome == 'failure'
        run: exit 1
      - run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run build
