name: evaluation-tests

on:
  push:
    paths:
      - "evaluation/**"
      - ".github/workflows/evaluation-tests.yml"
  pull_request:
    paths:
      - "evaluation/**"
      - ".github/workflows/evaluation-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile evaluation package
        run: python -m compileall -q evaluation
      - name: Run unit tests
        run: python -m unittest discover -s evaluation/tests -v
      - name: Build offline benchmark dataset
        run: |
          python -m evaluation.prepare_dataset \
            --questions 60 \
            --output-dir /tmp/evaluation-data
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path('/tmp/evaluation-data/dataset_summary.json').read_text())
          assert summary == {
              'chunks': 18,
              'documents': 3,
              'original_questions': 15,
              'paraphrased_questions': 45,
              'questions': 60,
          }, summary
          PY
